<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snoopy's Interactive World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #eef3f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
        }

        /* Browser Window Mockup */
        .browser-mockup {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .browser-header {
            background: #e1e7ec;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #bdc7d0;
            position: relative;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 16px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .address-bar {
            background: #ffffff;
            color: #333;
            padding: 6px 20px;
            border-radius: 6px;
            width: 40%;
            margin: 0 auto;
            text-align: center;
            font-size: 14px;
            font-family: Arial, sans-serif;
            border: 1px solid #b3bfc9;
        }

        /* Main Interface */
        .app-content {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: #f7f9fb;
        }

        .panel-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-title {
            text-align: center;
            font-size: 26px;
            color: #000;
            letter-spacing: 1px;
        }

        .panel {
            background: #f8f6e8; 
            border: 4px solid #000000;
            border-radius: 8px;
            height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* --- SNOOPY PANEL --- */
        .snoopy-stage {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
        }

        .speech-bubble {
            position: absolute;
            top: 30px;
            right: 40px;
            background: white;
            border: 4px solid #000;
            border-radius: 40px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            z-index: 10;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .speech-bubble.show {
            opacity: 1;
            transform: scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 30px;
            border-width: 20px 20px 0 0;
            border-style: solid;
            border-color: #000 transparent;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 33px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: #fff transparent;
            z-index: 11;
        }

        /* Custom drawn table */
        .table {
            width: 80%;
            height: 60px;
            background: #a37241;
            border: 4px solid #000;
            border-radius: 5px;
            position: relative;
            z-index: 1;
        }
        .table-leg {
            position: absolute;
            width: 20px;
            height: 40px;
            background: #8b5a2b;
            border: 4px solid #000;
            top: 56px;
        }
        .table-leg.left { left: 20px; }
        .table-leg.right { right: 20px; }

        .snoopy-img {
            width: 180px;
            height: auto;
            position: relative;
            z-index: 2;
            cursor: pointer;
            margin-bottom: -10px;
            transition: transform 0.2s ease;
        }

        /* --- SNOOPY ANIMATIONS --- */
        @keyframes giggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg) translateY(-5px); }
            50% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg) translateY(-5px); }
        }
        @keyframes compliment-nod {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05, 0.95) translateY(10px); }
        }
        @keyframes kiss-bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px) scale(1.05); }
            60% { transform: translateY(-30px) scale(1.05) rotate(-5deg); }
        }

        .anim-giggle { animation: giggle 0.5s ease-in-out 2; }
        .anim-nod { animation: compliment-nod 0.6s ease-in-out 1; }
        .anim-kiss { animation: kiss-bounce 0.8s ease-in-out 1; }

        /* Status UI Boxes */
        .status-box {
            background: white;
            border: 4px solid #000;
            border-radius: 8px;
            width: 90%;
            margin-bottom: 20px;
            padding: 10px;
            text-align: center;
        }

        .click-header {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .steps-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: #666;
            width: 30%;
        }

        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #eee;
            color: #999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .step.active .step-circle {
            background: #f2cf40;
            color: #000;
            border: 2px solid #000;
            transform: scale(1.1);
        }
        .step.active span {
            color: #000;
            font-weight: bold;
        }

        /* --- WHEEL PANEL --- */
        .wheel-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            position: relative;
            width: 100%;
            margin-top: 20px;
        }

        .wheel-container {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 6px solid #000000;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.25, 1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
        }

        /* Improved clean typography structure for wheel text */
        .slice-text-group {
            transition: opacity 0.4s ease, filter 0.4s ease;
        }
        
        .slice-text-group.eliminated {
            opacity: 0.25;
            filter: grayscale(1) blur(0.5px);
        }

        .slice-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: bold;
            font-size: 20px;
            fill: #000000;
        }

        .pointer-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 40px solid #000000;
            z-index: 10;
        }
        .pointer-arrow::after {
            content: '';
            position: absolute;
            right: -37px;
            top: -20px;
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 32px solid #ffffff;
            z-index: 11;
        }

        .spin-btn {
            background: #ffffff;
            color: #000000;
            border: 4px solid #000;
            padding: 10px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 15px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s;
        }
        .spin-btn:hover { background-color: #f0f0f0; }
        .spin-btn:active { transform: translateY(2px); }
        .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #e0e0e0; }

        /* Dynamic Result Area Display Box */
        .result-display-panel {
            padding: 14px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 4px solid #000;
            border-radius: 0 0 4px 4px;
            background: #ffffff;
        }

        .result-header {
            font-size: 13px;
            color: #777;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .result-main-text {
            font-size: 24px;
            font-weight: 900;
            color: #000000;
        }

        /* Heart particle for kiss */
        .heart {
            position: absolute;
            font-size: 30px;
            color: red;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes float-heart {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="browser-mockup">
        <!-- Header -->
        <div class="browser-header">
            <div class="window-buttons">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="address-bar">Snoopy's Interactive World</div>
        </div>

        <!-- Content App Layout -->
        <div class="app-content">
            
            <!-- LEFT PANEL: INTERACTIVE SNOOPY -->
            <div class="panel-wrapper">
                <h2 class="panel-title">Interactive Snoopy Panel</h2>
                <div class="panel">
                    <div class="snoopy-stage">
                        <div class="speech-bubble" id="snoopy-bubble">Hehehehe!<br>That's ticklish!</div>
                        
                        <!-- Snoopy Graphic Anchor -->
                        <img src="snoopy-600nw-2709284725.webp" alt="Snoopy" class="snoopy-img" id="snoopy-char" onclick="handleSnoopyClick()">
                        <div id="heart-particle" class="heart">❤️</div>
                        
                        <!-- Table Asset -->
                        <div class="table">
                            <div class="table-leg left"></div>
                            <div class="table-leg right"></div>
                        </div>
                    </div>

                    <!-- Sequence Interactive Tracker Box -->
                    <div class="status-box">
                        <div class="click-header">Click Count</div>
                        <div class="steps-container">
                            <div class="step active" id="step-1">
                                <div class="step-circle">1</div>
                                <span>[Click 1 - ACTIVE Giggles]</span>
                            </div>
                            <div class="step" id="step-2">
                                <div class="step-circle">2</div>
                                <span>[Click 2 - Next: Warm Compliment]</span>
                            </div>
                            <div class="step" id="step-3">
                                <div class="step-circle">3</div>
                                <span>[Click 3 - Final: Sweet Kiss]</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: ELIMINATION WHEEL -->
            <div class="panel-wrapper">
                <h2 class="panel-title">The Snoopy spinner wheel</h2>
                <div class="panel">
                    
                    <div class="wheel-stage">
                        <!-- Stationary Indicator Needle -->
                        <div class="pointer-arrow"></div>
                        
                        <!-- Mathematical Rotating Container -->
                        <div class="wheel-container" id="wheel">
                            <svg class="wheel-svg" viewBox="0 0 200 200">
                                <!-- Red Segment -->
                                <path d="M 100 100 L 100 0 A 100 100 0 0 1 186.6 150 Z" fill="#d9383a"/>
                                <!-- Blue Segment -->
                                <path d="M 100 100 L 186.6 150 A 100 100 0 0 1 13.4 150 Z" fill="#3ab1e0"/>
                                <!-- Yellow Segment -->
                                <path d="M 100 100 L 13.4 150 A 100 100 0 0 1 100 0 Z" fill="#f2cf40"/>

                                <!-- Segment 0 text: Birthday Card (Center: 60deg) -->
                                <g transform="rotate(60, 100, 100)" class="slice-text-group" id="slice-group-0">
                                    <text x="100" y="38" class="slice-text" text-anchor="middle">Birthday</text>
                                    <text x="100" y="60" class="slice-text" text-anchor="middle">Card</text>
                                </g>

                                <!-- Segment 1 text: Dear Friend (Center: 180deg) -->
                                <g transform="rotate(180, 100, 100)" class="slice-text-group" id="slice-group-1">
                                    <text x="100" y="38" class="slice-text" text-anchor="middle">Dear</text>
                                    <text x="100" y="60" class="slice-text" text-anchor="middle">Friend</text>
                                </g>

                                <!-- Segment 2 text: Make a Wish (Center: 300deg) -->
                                <g transform="rotate(300, 100, 100)" class="slice-text-group" id="slice-group-2">
                                    <text x="100" y="38" class="slice-text" text-anchor="middle">Make a</text>
                                    <text x="100" y="60" class="slice-text" text-anchor="middle">Wish</text>
                                </g>
                            </svg>
                        </div>
                    </div>

                    <!-- Interaction trigger CTA -->
                    <button class="spin-btn" id="spin-btn" onclick="spinWheel()">SPIN!</button>

                    <!-- Refined Landing Output Area Box (replaces old fonts message panel) -->
                    <div class="status-box result-display-panel">
                        <div class="result-header">Landed On</div>
                        <div id="result-text" class="result-main-text">Ready to Spin! ✨</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- SNOOPY INTERACTION LOGIC ---
        const snoopyChar = document.getElementById('snoopy-char');
        const bubble = document.getElementById('snoopy-bubble');
        const heart = document.getElementById('heart-particle');
        
        let clickCount = 0;

        function handleSnoopyClick() {
            if (snoopyChar.className.includes('anim-')) return;

            clickCount++;
            if (clickCount > 3) clickCount = 1;

            // Update UI step progression
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.remove('active');
            document.getElementById(`step-${clickCount}`).classList.add('active');

            if (clickCount === 1) {
                bubble.innerHTML = "Hehehehe!<br>That's ticklish!";
                bubble.classList.add('show');
                snoopyChar.classList.add('anim-giggle');
            } 
            else if (clickCount === 2) {
                bubble.innerHTML = "You're a<br>wonderful friend!";
                bubble.classList.add('show');
                snoopyChar.classList.add('anim-nod');
            } 
            else if (clickCount === 3) {
                bubble.innerHTML = "Mwah! 💋";
                bubble.classList.add('show');
                snoopyChar.classList.add('anim-kiss');
                
                heart.style.left = (snoopyChar.offsetLeft + 80) + 'px';
                heart.style.top = (snoopyChar.offsetTop + 20) + 'px';
                heart.style.animation = 'float-heart 1s ease-out forwards';
            }

            setTimeout(() => {
                snoopyChar.className = 'snoopy-img';
                bubble.classList.remove('show');
                if (clickCount === 3) heart.style.animation = '';
            }, 1500);
        }

        // --- WHEEL ELIMINATION AND SPIN ENGINE ---
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        const resultTextDisplay = document.getElementById('result-text');

        // Sector Data Mappings
        const sectors = [
            { id: 0, label: "Birthday Card 🎂", targetAngle: 30 },  // Center 60deg -> maps to 90deg pointer
            { id: 1, label: "Dear Friend 🤝", targetAngle: 270 },  // Center 180deg -> maps to 90deg pointer
            { id: 2, label: "Make a Wish ✨", targetAngle: 150 }   // Center 300deg -> maps to 90deg pointer
        ];

        // Selection Pool arrays
        let availableIndices = [0, 1, 2];
        let currentRotation = 0;
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;

            // If pool is fully depleted, automatically restart round seamlessly
            if (availableIndices.length === 0) {
                availableIndices = [0, 1, 2];
                sectors.forEach(s => {
                    document.getElementById(`slice-group-${s.id}`).classList.remove('eliminated');
                });
            }

            isSpinning = true;
            spinBtn.disabled = true;
            resultTextDisplay.style.opacity = "0.5";
            resultTextDisplay.innerText = "Spinning...";

            // Randomly pull an available item from remaining index pool
            const randomPoolIndex = Math.floor(Math.random() * availableIndices.length);
            const targetSectorIndex = availableIndices[randomPoolIndex];
            
            // Remove selection from the pool immediately so it cannot repeat next time
            availableIndices.splice(randomPoolIndex, 1);

            const targetSector = sectors[targetSectorIndex];
            const baseAngle = targetSector.targetAngle;

            // Math execution logic to always land directly onto chosen slice boundary
            const extraSpins = 1440; // 4 clean full spin rotations 
            const degreesToNextZero = 360 - (currentRotation % 360);
            const targetRotation = currentRotation + degreesToNextZero + extraSpins + baseAngle;
            
            currentRotation = targetRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Execute landing sequences after momentum physics wrapper transitions (4000ms)
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // Display text update
                resultTextDisplay.style.opacity = "1";
                resultTextDisplay.innerText = targetSector.label;

                // Visually dim the text segment on the wheel interface layout
                document.getElementById(`slice-group-${targetSectorIndex}`).classList.add('eliminated');

                // If pool becomes empty on this turn, alert user next spin resets game cycle
                if (availableIndices.length === 0) {
                    spinBtn.innerText = "RESET & SPIN!";
                } else {
                    spinBtn.innerText = "SPIN!";
                }

                // Alert Snoopy response prompt feedback loop hook
                bubble.innerHTML = `Ooh! Look!<br>${targetSector.label}`;
                bubble.classList.add('show');
                snoopyChar.classList.add('anim-nod');
                setTimeout(() => {
                    snoopyChar.className = 'snoopy-img';
                    bubble.classList.remove('show');
                }, 1800);

            }, 4000);
        }
    </script>
</body>
</html>
